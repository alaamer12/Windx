<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Elegant Form</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            animation: pulse 15s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .page-container {
            background: white;
            border-radius: 24px;
            box-shadow: var(--shadow-xl), 0 0 0 1px rgba(0, 0, 0, 0.05);
            max-width: 1000px;
            width: 100%;
            overflow: hidden;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.6s ease-out;
        }

        .page-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .page-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 3px;
            position: relative;
            z-index: 1;
            text-transform: uppercase;
        }

        .page-content {
            padding: 60px;
            display: flex;
            gap: 60px;
            align-items: flex-start;
        }

        .form-section {
            flex: 1;
            animation: fadeInUp 0.6s ease-out 0.2s backwards;
        }

        .form-group {
            margin-bottom: 32px;
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            letter-spacing: 0.3px;
            transition: color 0.3s ease;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            background: var(--bg-light);
            color: var(--text-dark);
            font-family: inherit;
        }

        .form-input::placeholder {
            color: var(--text-light);
        }

        .form-input:hover {
            border-color: var(--primary);
            background: white;
        }

        .form-input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
        }

        .form-input:focus + .input-indicator {
            width: 100%;
        }

        .input-indicator {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.4s ease;
        }

        .char-count {
            position: absolute;
            right: 12px;
            bottom: -24px;
            font-size: 12px;
            color: var(--text-light);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .form-input:focus ~ .char-count {
            opacity: 1;
        }

        .image-section {
            flex-shrink: 0;
            animation: slideInRight 0.6s ease-out 0.4s backwards;
        }

        .image-container {
            position: relative;
            width: 240px;
            height: 240px;
            border: 3px dashed var(--border);
            border-radius: 16px;
            background: var(--bg-light);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
        }

        .image-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 0;
        }

        .image-container:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-style: solid;
        }

        .image-container:hover::before {
            opacity: 0.05;
        }

        .image-container.drag-over {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            border-style: solid;
            transform: scale(1.02);
        }

        .image-placeholder {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .image-container:hover .image-placeholder {
            transform: scale(1.1);
        }

        .plus-icon {
            font-size: 48px;
            color: var(--primary);
            font-weight: 300;
            line-height: 1;
        }

        .upload-text {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 500;
        }

        .upload-hint {
            font-size: 12px;
            color: var(--text-light);
            opacity: 0.7;
        }

        .image-label {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-light);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .preview-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            inset: 0;
            z-index: 2;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .image-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 3;
            cursor: pointer;
        }

        .image-container:hover .image-overlay {
            opacity: 1;
        }

        .change-text {
            color: white;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            backdrop-filter: blur(10px);
        }

        .hidden {
            display: none;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-md);
            margin-top: 12px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .success-message {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transform: translateX(400px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        .success-message.show {
            opacity: 1;
            transform: translateX(0);
        }

        .success-icon {
            width: 24px;
            height: 24px;
            background: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .page-content {
                flex-direction: column;
                padding: 40px 30px;
                gap: 40px;
            }

            .image-section {
                align-self: center;
            }

            .page-header {
                padding: 30px;
            }

            .page-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <h1 class="page-title">Page</h1>
        </div>
        
        <div class="page-content">
            <div class="form-section">
                <form id="mainForm">
                    <div class="form-group">
                        <label class="form-label" for="fieldOne">Field One</label>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                class="form-input" 
                                id="fieldOne" 
                                placeholder="Enter your text here..."
                                maxlength="100"
                            >
                            <div class="input-indicator"></div>
                            <span class="char-count"><span id="count1">0</span>/100</span>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="fieldTwo">Field Two</label>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                class="form-input" 
                                id="fieldTwo" 
                                placeholder="Enter your text here..."
                                maxlength="100"
                            >
                            <div class="input-indicator"></div>
                            <span class="char-count"><span id="count2">0</span>/100</span>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">Submit Form</button>
                </form>
            </div>
            
            <div class="image-section">
                <div class="image-container" id="imageContainer">
                    <div class="image-placeholder" id="placeholder">
                        <div class="plus-icon">+</div>
                        <div class="upload-text">Upload Image</div>
                        <div class="upload-hint">Click or drag & drop</div>
                    </div>
                    <img src="" alt="Preview" class="preview-image hidden" id="previewImage">
                    <div class="image-overlay hidden" id="imageOverlay">
                        <span class="change-text">Change Image</span>
                    </div>
                </div>
                <div class="image-label">_image_</div>
                <input type="file" id="fileInput" accept="image/*" class="hidden">
            </div>
        </div>
    </div>

    <div class="success-message" id="successMessage">
        <div class="success-icon">✓</div>
        <span>Form submitted successfully!</span>
    </div>

    <script>
        // Image upload functionality
        const imageContainer = document.getElementById('imageContainer');
        const fileInput = document.getElementById('fileInput');
        const previewImage = document.getElementById('previewImage');
        const placeholder = document.getElementById('placeholder');
        const imageOverlay = document.getElementById('imageOverlay');

        // Character counter functionality
        const fieldOne = document.getElementById('fieldOne');
        const fieldTwo = document.getElementById('fieldTwo');
        const count1 = document.getElementById('count1');
        const count2 = document.getElementById('count2');

        fieldOne.addEventListener('input', (e) => {
            count1.textContent = e.target.value.length;
        });

        fieldTwo.addEventListener('input', (e) => {
            count2.textContent = e.target.value.length;
        });

        // Image upload click handler
        imageContainer.addEventListener('click', () => {
            fileInput.click();
        });

        // File input change handler
        fileInput.addEventListener('change', handleFileSelect);

        function handleFileSelect(e) {
            const file = e.target.files[0];
            
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                
                reader.onload = (event) => {
                    previewImage.src = event.target.result;
                    previewImage.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    imageOverlay.classList.remove('hidden');
                    imageContainer.style.borderStyle = 'solid';
                    imageContainer.style.borderColor = 'var(--primary)';
                };
                
                reader.readAsDataURL(file);
            }
        }

        // Drag and drop functionality
        imageContainer.addEventListener('dragover', (e) => {
            e.preventDefault();
            imageContainer.classList.add('drag-over');
        });

        imageContainer.addEventListener('dragleave', (e) => {
            e.preventDefault();
            imageContainer.classList.remove('drag-over');
        });

        imageContainer.addEventListener('drop', (e) => {
            e.preventDefault();
            imageContainer.classList.remove('drag-over');
            
            const file = e.dataTransfer.files[0];
            
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                
                reader.onload = (event) => {
                    previewImage.src = event.target.result;
                    previewImage.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    imageOverlay.classList.remove('hidden');
                    imageContainer.style.borderStyle = 'solid';
                    imageContainer.style.borderColor = 'var(--primary)';
                };
                
                reader.readAsDataURL(file);
            }
        });

        // Form submission
        const mainForm = document.getElementById('mainForm');
        const successMessage = document.getElementById('successMessage');

        mainForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Show success message
            successMessage.classList.add('show');
            
            // Hide success message after 3 seconds
            setTimeout(() => {
                successMessage.classList.remove('show');
            }, 3000);
            
            // Log form data (in real app, this would be sent to server)
            console.log({
                fieldOne: fieldOne.value,
                fieldTwo: fieldTwo.value,
                image: previewImage.src ? 'Image uploaded' : 'No image'
            });
        });

        // Add smooth scroll behavior
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });

        // Add input animation on focus
        const inputs = document.querySelectorAll('.form-input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.parentElement.querySelector('.form-label').style.color = 'var(--primary)';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.parentElement.querySelector('.form-label').style.color = 'var(--text-dark)';
            });
        });
    </script>
</body>
</html>
